<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Registro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Registrar Usuario</h2>

<form action="/save" method="post" th:object="${user}">

<input type="text" th:field="*{name}" placeholder="Nombre" class="form-control mb-2"/>
<input type="email" th:field="*{email}" placeholder="Email" class="form-control mb-2"/>
<input type="text" th:field="*{skill}" placeholder="Skill" class="form-control mb-2"/>

<button class="btn btn-success">Guardar</button>

</form>

</div>

</body>
</html>
