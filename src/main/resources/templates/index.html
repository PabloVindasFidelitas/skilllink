<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Skilllink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <h2>Usuarios</h2>

    <a href="/register" class="btn btn-primary mb-3">Registrar</a>
    <a href="/solicitudes/form" class="btn btn-success mb-3">Solicitar Tutoría</a>

    <table class="table mt-3">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Skill</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.skill}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${user.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm">Eliminar</a>

                    <a th:href="@{/solicitudes/form?tutor=${user.name}}" 
                       class="btn btn-success btn-sm">
                       Solicitar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
