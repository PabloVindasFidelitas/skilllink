<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Editar Usuario</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Editar Usuario</h2>

<form action="/update" method="post" th:object="${user}">

<input type="hidden" th:field="*{id}"/>

<input type="text" th:field="*{name}" class="form-control mb-2"/>
<input type="email" th:field="*{email}" class="form-control mb-2"/>
<input type="text" th:field="*{skill}" class="form-control mb-2"/>

<button class="btn btn-warning">Actualizar</button>

</form>

</div>

</body>
</html>
